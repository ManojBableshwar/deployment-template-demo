# BYOC deployment — all settings specified explicitly (no deployment template).
# Environment, probes, env vars, model mount, and instance type are all in this file.
$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json
name: byoc-vllm
endpoint_name: qwen35-endpoint
model: azureml://registries/mabables-reg-feb26/models/Qwen35-08B/versions/5
environment: azureml://registries/mabables-reg-feb26/environments/vllm-qwen35/versions/11
instance_type: Standard_NC40ads_H100_v5
instance_count: 1
environment_variables:
  VLLM_SERVED_MODEL_NAME: "Qwen3.5-0.8B"
  VLLM_MODEL_NAME: "/opt/ml/model"
  VLLM_TENSOR_PARALLEL_SIZE: "1"
  VLLM_MAX_MODEL_LEN: "131072"
  VLLM_GPU_MEMORY_UTILIZATION: "0.9"
  HF_HOME: "/tmp/hf_cache"
request_settings:
  request_timeout_ms: 90000
  max_concurrent_requests_per_instance: 10
liveness_probe:
  initial_delay: 600
  period: 10
  failure_threshold: 30
  timeout: 10
readiness_probe:
  initial_delay: 600
  period: 10
  failure_threshold: 30
  timeout: 10
