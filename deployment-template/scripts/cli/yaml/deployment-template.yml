$schema: https://azuremlschemas.azureedge.net/latest/deploymentTemplate.schema.json
name: vllm-1gpu-h100
version: 21
description: "Generic vLLM deployment template for single-GPU models on H100"
deployment_template_type: managed
environment: azureml://registries/mabables-reg-feb26/environments/vllm-qwen35/versions/21
default_instance_type: Standard_NC40ads_H100_v5
allowed_instance_types: Standard_NC40ads_H100_v5
instance_count: 1
scoring_port: 8000
scoring_path: /v1
model_mount_path: /opt/ml/model
environment_variables:
  VLLM_TENSOR_PARALLEL_SIZE: "1"
  VLLM_MAX_MODEL_LEN: "131072"
  VLLM_GPU_MEMORY_UTILIZATION: "0.9"
  VLLM_SERVED_MODEL_NAME: "Qwen3.5-0.8B"
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  VLLM_NO_USAGE_STATS: "1"
  HF_HOME: "/tmp/hf_cache"
request_settings:
  request_timeout_ms: 90000
  max_concurrent_requests_per_instance: 10
liveness_probe:
  initial_delay: 600
  period: 10
  timeout: 10
  path: /health
  port: 8000
readiness_probe:
  initial_delay: 600
  period: 10
  timeout: 10
  path: /health
  port: 8000
