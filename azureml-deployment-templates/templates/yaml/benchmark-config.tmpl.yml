# Benchmark configuration for ${MODEL_NAME}
# Auto-generated by step 2 (create-deployment-template) using calc-vllm-config.sh
#
# Concurrency levels are computed per token-config based on KV cache capacity.
# max_batch = max_kv_tokens / (input + output), capped at 256.
# Concurrency series: powers-of-2 up to 1.5× max_batch, plus max_batch itself.
#
# This file is overwritten by step 2; manual edits are preserved only if
# step 2 is skipped on re-runs (assets already exist in registry).

benchmark:
  request_count: 100
  max_num_seqs: ${VLLM_MAX_NUM_SEQS}
  max_kv_tokens: ${BENCHMARK_MAX_KV_TOKENS}

  token_configs:
    - input: 200
      output: 800
      label: "short-gen"
      concurrencies: []
    - input: 800
      output: 200
      label: "short-prompt"
      concurrencies: []
    - input: 2000
      output: 8000
      label: "long-gen"
      concurrencies: []
    - input: 8000
      output: 2000
      label: "long-prompt"
      concurrencies: []
