$schema: https://azuremlschemas.azureedge.net/latest/deploymentTemplate.schema.json
name: ${TEMPLATE_NAME}
version: ${TEMPLATE_VERSION}
description: "vLLM deployment template for ${HF_MODEL_ID}"
deployment_template_type: managed
environment: azureml://registries/${AZUREML_REGISTRY}/environments/${ENVIRONMENT_NAME}/versions/${ENVIRONMENT_VERSION}
default_instance_type: ${INSTANCE_TYPE_H100}
allowed_instance_types: "Standard_NC24ads_A100_v4 Standard_NC48ads_A100_v4 Standard_NC40ads_H100_v5 Standard_NC80adis_H100_v5"
instance_count: 1
scoring_port: 8000
scoring_path: /v1
model_mount_path: /opt/ml/model
environment_variables:
  VLLM_TENSOR_PARALLEL_SIZE: "${VLLM_TENSOR_PARALLEL_SIZE}"
  VLLM_MAX_MODEL_LEN: "${VLLM_MAX_MODEL_LEN}"
  VLLM_GPU_MEMORY_UTILIZATION: "${VLLM_GPU_MEMORY_UTILIZATION}"
  VLLM_MAX_NUM_SEQS: "${VLLM_MAX_NUM_SEQS}"
  VLLM_TOOL_CALL_PARSER: "${VLLM_TOOL_CALL_PARSER}"
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  VLLM_NO_USAGE_STATS: "1"
  HF_HOME: "/tmp/hf_cache"
request_settings:
  request_timeout_ms: 90000
  max_concurrent_requests_per_instance: 250
liveness_probe:
  initial_delay: 600
  period: 10
  timeout: 10
  success_threshold: 1
  scheme: http
  method: GET
  path: /health
  port: 8000
readiness_probe:
  initial_delay: 600
  period: 10
  timeout: 10
  success_threshold: 1
  scheme: http
  method: GET
  path: /health
  port: 8000
