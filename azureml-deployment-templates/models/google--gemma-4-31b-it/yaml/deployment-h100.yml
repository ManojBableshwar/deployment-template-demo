name: google--gemma-4-31b-it-vllm
endpoint_name: google--gemma-4-31b-it-h100
model: azureml://registries/mabables-reg-feb26/models/google--gemma-4-31b-it/versions/6
instance_type: Standard_NC80adis_H100_v5
instance_count: 1
environment_variables:
